name: Live Canary

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'

jobs:
  live-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run --auto-servernum npm run test:canary

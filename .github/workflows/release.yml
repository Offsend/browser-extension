name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate credentials and build without actually publishing'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Quality gates before we ship anything to the store.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - name: Build & zip (Chrome)
        run: npm run zip

      - name: Upload Chrome ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: .output/*-chrome.zip
          if-no-files-found: error
          # .output is a dotfile dir; upload-artifact@v4 skips hidden paths by default.
          include-hidden-files: true

      - name: Submit to Chrome Web Store
        run: npx wxt submit ${{ inputs.dry_run && '--dry-run' || '' }} --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
